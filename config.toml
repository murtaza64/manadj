# manadj configuration file

[database]
# Path to Engine DJ Database2 folder (leave empty to disable)
engine_dj_path = "/Users/murtaza/Music/Engine Library/Database2"

# Path to Rekordbox database folder (leave empty to disable)
rekordbox_path = "/Users/murtaza/Library/Pioneer/rekordbox"

[library]
# Path to music library directory for importing tracks
tracks_directory = "/Users/murtaza/Music/Tracks"

[analysis]
# Key detection backend: "essentia" (default) or "keyfinder" (DJ-optimized)
key_detection_backend = "essentia"

[soundcloud]
# Personal OAuth token for the SoundCloud Source (Acquisition).
# This file is committed — do NOT put the real token here. Put it in the
# gitignored .env file at the repo root instead:
#   SOUNDCLOUD_OAUTH_TOKEN=...
# (A real environment variable takes precedence over .env.)
oauth_token = ""
